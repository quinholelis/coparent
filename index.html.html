<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="CoParent"/>
  <meta name="theme-color" content="#0A0A12"/>
  <meta name="description" content="Guarda compartilhada com harmonia"/>
  <title>CoParent</title>

  <!-- PWA manifest inline via blob -->
  <script>
    (function() {
      const manifest = {
        name: "CoParent — Guarda Compartilhada",
        short_name: "CoParent",
        description: "Guarda compartilhada com harmonia",
        start_url: window.location.href,
        display: "standalone",
        orientation: "portrait",
        background_color: "#0A0A12",
        theme_color: "#0A0A12",
        lang: "pt-BR",
        icons: [
          { src: "data:image/svg+xml," + encodeURIComponent(`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512"><circle cx="256" cy="256" r="256" fill="#1D4ED8"/><circle cx="164" cy="164" r="52" fill="#93C5FD"/><path d="M72 320 Q72 248 164 248 Q256 248 256 320" fill="#93C5FD"/><circle cx="348" cy="164" r="52" fill="#F9A8D4"/><path d="M256 320 Q256 248 348 248 Q440 248 440 320" fill="#F9A8D4"/><circle cx="256" cy="368" r="40" fill="#FDE68A"/><path d="M184 460 Q184 420 256 420 Q328 420 328 460" fill="#FDE68A"/><path d="M256 226 C256 226 215 195 215 169 C215 154 230 144 246 154 L256 164 L266 154 C282 144 297 154 297 169 C297 195 256 226 256 226Z" fill="white" opacity="0.9"/></svg>`), sizes: "512x512", type: "image/svg+xml" }
        ]
      };
      const blob = new Blob([JSON.stringify(manifest)], {type:"application/manifest+json"});
      const link = document.createElement("link");
      link.rel = "manifest"; link.href = URL.createObjectURL(blob);
      document.head.appendChild(link);
    })();
  </script>

  <!-- Apple touch icon inline SVG -->
  <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Ccircle cx='256' cy='256' r='256' fill='%231D4ED8'/%3E%3Ccircle cx='164' cy='164' r='52' fill='%2393C5FD'/%3E%3Cpath d='M72 320 Q72 248 164 248 Q256 248 256 320' fill='%2393C5FD'/%3E%3Ccircle cx='348' cy='164' r='52' fill='%23F9A8D4'/%3E%3Cpath d='M256 320 Q256 248 348 248 Q440 248 440 320' fill='%23F9A8D4'/%3E%3Ccircle cx='256' cy='368' r='40' fill='%23FDE68A'/%3E%3Cpath d='M184 460 Q184 420 256 420 Q328 420 328 460' fill='%23FDE68A'/%3E%3Cpath d='M256 226 C256 226 215 195 215 169 C215 154 230 144 246 154 L256 164 L266 154 C282 144 297 154 297 169 C297 195 256 226 256 226Z' fill='white' opacity='0.9'/%3E%3C/svg%3E"/>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body, #root { height: 100%; width: 100%; }
    body {
      background: #0A0A12;
      font-family: Georgia, serif;
      color: #F0EDE8;
      overscroll-behavior: none;
      -webkit-font-smoothing: antialiased;
    }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: #ffffff20; border-radius: 4px; }
    input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(1); opacity: 0.5; }
    input, select, textarea { -webkit-appearance: none; appearance: none; font-size: 16px !important; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>

  <!-- Inline Service Worker -->
  <script>
    if ("serviceWorker" in navigator) {
      const swCode = `
        const CACHE = "coparent-v1";
        self.addEventListener("install", e => { self.skipWaiting(); });
        self.addEventListener("activate", e => { self.clients.claim(); });
        self.addEventListener("fetch", e => {
          e.respondWith(fetch(e.request).catch(() => new Response("Offline")));
        });
      `;
      const blob = new Blob([swCode], {type:"text/javascript"});
      navigator.serviceWorker.register(URL.createObjectURL(blob), {scope:"/"}).catch(()=>{});
    }
  </script>

  <script type="text/babel">
    const { useState, useEffect } = React;

    const MONTHS_PT = ["Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];
    const DAYS_PT   = ["Dom","Seg","Ter","Qua","Qui","Sex","Sáb"];
    const C = { pai:"#3B82F6", mae:"#EC4899", ambos:"#8B5CF6", viagem:"#F59E0B" };

    const AVATAR_OPTIONS = [
      { emoji:"👨", role:"Pai",  label:"Homem" },
      { emoji:"👴", role:"Pai",  label:"Mais velho" },
      { emoji:"👩", role:"Mãe",  label:"Mulher" },
      { emoji:"👵", role:"Mãe",  label:"Mais velha" },
      { emoji:"🧑", role:null,   label:"Neutro" },
    ];

    const INITIAL_DATA = {
      custodyDays:{}, trips:[], notes:[], expenses:[], pendingRequests:[],
      healthRecords:{ vaccines:[], consultations:[], medications:[], allergies:[] },
      handoffs:[], checklistTemplates:["🎒 Mochila","💊 Remédios","📚 Material escolar","🧸 Brinquedo favorito","👕 Roupas extras"],
      schoolEvents:[],
    };

    async function hashPw(pw) {
      const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(pw+"coparent_salt_2024"));
      return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,"0")).join("");
    }

    function lsGet(k) { try { const v=localStorage.getItem(k); return v?JSON.parse(v):null; } catch{return null;} }
    function lsSet(k,v) { try { localStorage.setItem(k,JSON.stringify(v)); } catch{} }
    function roleColor(r) { return r?.startsWith("Pai")?C.pai:C.mae; }
    function bgColor(w)   { return w==="pai"?C.pai:w==="mae"?C.mae:w==="ambos"?C.ambos:"transparent"; }
    function custodyLabel(w){ return !w?"Nenhum":w==="pai"?"Pai":w==="mae"?"Mãe":"Ambos"; }
    function typeLabel(t)   { return{custody:"Calendário",trip:"Viagem",note:"Nota",expense:"Despesa"}[t]||t; }
    const schoolTypeMap = { reuniao:"👥",evento:"🎉",feriado:"📅",avaliacao:"📝",outro:"📌" };

    async function callClaude(prompt) {
      const res = await fetch("https://api.anthropic.com/v1/messages",{
        method:"POST", headers:{"Content-Type":"application/json"},
        body:JSON.stringify({ model:"claude-sonnet-4-20250514", max_tokens:1000, messages:[{role:"user",content:prompt}] })
      });
      const d = await res.json();
      return d.content?.[0]?.text||"";
    }

    // ── Styles ──
    const iS={width:"100%",background:"#0A0A12",border:"1px solid #ffffff15",borderRadius:8,padding:"10px 12px",color:"#F0EDE8",fontSize:16,fontFamily:"Georgia,serif",boxSizing:"border-box"};
    const addBtn={background:"linear-gradient(135deg,#1D4ED8,#7C3AED)",border:"none",color:"#fff",padding:"9px 14px",borderRadius:10,cursor:"pointer",fontSize:13,fontFamily:"Georgia,serif",fontWeight:"bold"};
    const navBtn={background:"#ffffff0D",border:"1px solid #ffffff10",color:"#F0EDE8",width:34,height:34,borderRadius:8,cursor:"pointer",fontSize:17,fontFamily:"inherit"};

    // ── Logo ──
    function Logo({size=48}) {
      return <svg width={size} height={size} viewBox="0 0 100 100" fill="none">
        <circle cx="50" cy="50" r="50" fill="url(#lg)"/>
        <circle cx="32" cy="32" r="10" fill="#93C5FD"/>
        <path d="M14 62 Q14 48 32 48 Q50 48 50 62" fill="#93C5FD"/>
        <circle cx="68" cy="32" r="10" fill="#F9A8D4"/>
        <path d="M50 62 Q50 48 68 48 Q86 48 86 62" fill="#F9A8D4"/>
        <circle cx="50" cy="72" r="8" fill="#FDE68A"/>
        <path d="M36 90 Q36 82 50 82 Q64 82 64 90" fill="#FDE68A"/>
        <path d="M50 44 C50 44 42 38 42 33 C42 30 45 28 48 30 L50 32 L52 30 C55 28 58 30 58 33 C58 38 50 44 50 44Z" fill="white" opacity="0.9"/>
        <defs><linearGradient id="lg" x1="0" y1="0" x2="100" y2="100" gradientUnits="userSpaceOnUse">
          <stop offset="0%" stopColor="#1D4ED8"/><stop offset="50%" stopColor="#7C3AED"/><stop offset="100%" stopColor="#BE185D"/>
        </linearGradient></defs>
      </svg>;
    }

    function Toast({toast}) {
      const bg=toast.type==="success"?"#064e3b":toast.type==="error"?"#4c0519":"#1e3a5f";
      const br=toast.type==="success"?"#10b981":toast.type==="error"?"#f43f5e":"#3B82F6";
      return <div style={{position:"fixed",top:"calc(env(safe-area-inset-top) + 14px)",left:"50%",transform:"translateX(-50%)",zIndex:999,background:bg,border:`1px solid ${br}`,padding:"9px 18px",borderRadius:30,fontSize:13,color:"#F0EDE8",boxShadow:"0 4px 20px #00000060",whiteSpace:"nowrap",fontFamily:"Georgia,serif",maxWidth:"90vw",overflow:"hidden",textOverflow:"ellipsis"}}>{toast.msg}</div>;
    }

    function FI({label,value,onChange,type="text",required,step,placeholder}) {
      return <div style={{marginBottom:13}}>
        <label style={{fontSize:12,color:"#9CA3AF",display:"block",marginBottom:5}}>{label}</label>
        <input type={type} value={value} onChange={e=>onChange(e.target.value)} required={required} step={step} placeholder={placeholder} style={iS}/>
      </div>;
    }
    function FS({label,value,onChange,options}) {
      return <div style={{marginBottom:13}}>
        <label style={{fontSize:12,color:"#9CA3AF",display:"block",marginBottom:5}}>{label}</label>
        <select value={value} onChange={e=>onChange(e.target.value)} style={iS}>{options.map(([v,l])=><option key={v} value={v}>{l}</option>)}</select>
      </div>;
    }
    function MB({onCancel,submitLabel="Salvar"}) {
      return <div style={{display:"flex",gap:8,justifyContent:"flex-end",marginTop:16}}>
        <button type="button" onClick={onCancel} style={{...addBtn,background:"#ffffff12"}}>Cancelar</button>
        <button type="submit" style={addBtn}>{submitLabel}</button>
      </div>;
    }
    function EmptyState({emoji,text}) {
      return <div style={{textAlign:"center",padding:"36px 20px",color:"#4B5563"}}>
        <div style={{fontSize:38}}>{emoji}</div>
        <p style={{marginTop:8,fontSize:13}}>{text}</p>
      </div>;
    }
    function SC({label,value,color}) {
      return <div style={{background:"#13131F",border:"1px solid #ffffff08",borderRadius:12,padding:12,textAlign:"center"}}>
        <div style={{fontSize:14,fontWeight:"bold",color}}>R$ {value.toFixed(2)}</div>
        <div style={{fontSize:10,color:"#6B7280",marginTop:2}}>{label}</div>
      </div>;
    }
    function custodyTagEl(who) {
      const m={pai:<span style={{color:C.pai}}>Pai</span>,mae:<span style={{color:C.mae}}>Mãe</span>,ambos:<span style={{color:C.ambos}}>Ambos</span>};
      return m[who]||<span style={{color:"#6B7280"}}>Nenhum</span>;
    }

    // ══════════════════════════════════════════
    function App() {
      const [screen,  setScreen]  = useState("loading");
      const [curUser, setCurUser] = useState(null);
      const [authErr, setAuthErr] = useState("");
      const [toast,   setToast]   = useState(null);
      const [data,    setData]    = useState(INITIAL_DATA);
      const [tab,     setTab]     = useState("calendario");
      const [curDate, setCurDate] = useState(new Date());
      const [modal,   setModal]   = useState(null);
      const [form,    setForm]    = useState({});
      const [aForm,   setAForm]   = useState({name:"",email:"",password:"",avatar:AVATAR_OPTIONS[0],roleOverride:"Pai"});
      const [aiLoad,  setAiLoad]  = useState(false);
      const [aiText,  setAiText]  = useState("");
      const [aiRes,   setAiRes]   = useState(null);
      const [hTab,    setHTab]    = useState("vacinas");
      const [editCL,  setEditCL]  = useState(false);
      const [newCLItem,setNewCLItem] = useState("");

      const toast$ = (msg,type="info") => { setToast({msg,type}); setTimeout(()=>setToast(null),3200); };
      const derivedRole = (av,ov) => !av?"Pai":(av.role||ov||"Pai");

      useEffect(()=>{
        const s=lsGet("cp_session");
        if(s?.email){ const u=(lsGet("cp_users")||{})[s.email]; if(u){ setCurUser(u); const d=lsGet("cp_data")||INITIAL_DATA; setData({...INITIAL_DATA,...d,healthRecords:{...INITIAL_DATA.healthRecords,...(d.healthRecords||{})}}); setScreen("app"); return; } }
        setScreen("login");
      },[]);

      const save = nd => { setData(nd); lsSet("cp_data",nd); };

      async function doRegister(e) {
        e.preventDefault(); setAuthErr("");
        const{name,email,password,avatar,roleOverride}=aForm;
        if(!name||!email||!password){setAuthErr("Preencha todos os campos.");return;}
        if(password.length<6){setAuthErr("Mínimo 6 caracteres.");return;}
        const users=lsGet("cp_users")||{};
        if(users[email]){setAuthErr("E-mail já cadastrado.");return;}
        if(Object.keys(users).length>=2){setAuthErr("Máximo de 2 usuários.");return;}
        const role=derivedRole(avatar,roleOverride);
        const exist=Object.values(users).map(u=>u.role);
        const finalRole=exist.includes(role)?`${role} 2`:role;
        const pw=await hashPw(password);
        const u={name,email,role:finalRole,avatar:avatar.emoji,password:pw};
        users[email]=u; lsSet("cp_users",users); lsSet("cp_session",{email});
        setCurUser(u); setData(lsGet("cp_data")||INITIAL_DATA); setScreen("app"); toast$(`Bem-vindo(a), ${name}! 👋`,"success");
      }

      async function doLogin(e) {
        e.preventDefault(); setAuthErr("");
        const{email,password}=aForm;
        const users=lsGet("cp_users")||{}; const u=users[email];
        if(!u){setAuthErr("E-mail não encontrado.");return;}
        if(await hashPw(password)!==u.password){setAuthErr("Senha incorreta.");return;}
        lsSet("cp_session",{email}); setCurUser(u);
        const d=lsGet("cp_data")||INITIAL_DATA; setData({...INITIAL_DATA,...d,healthRecords:{...INITIAL_DATA.healthRecords,...(d.healthRecords||{})}});
        setScreen("app"); toast$(`Olá, ${u.name}! 👋`,"success");
      }

      const doLogout = () => { lsSet("cp_session",null); setCurUser(null); setAForm({name:"",email:"",password:"",avatar:AVATAR_OPTIONS[0],roleOverride:"Pai"}); setScreen("login"); setTab("calendario"); };

      const yr=curDate.getFullYear(), mo=curDate.getMonth();
      const firstDay=new Date(yr,mo,1).getDay(), daysInMo=new Date(yr,mo+1,0).getDate();
      const ds = d=>`${yr}-${String(mo+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;

      const pendingDay=day=>{const k=ds(day);return data.pendingRequests.find(r=>r.status==="pending"&&r.type==="custody"&&r.data.date===k);};
      const hasTrip=day=>{const k=ds(day);return data.trips.find(t=>k>=t.startDate&&k<=t.endDate);};
      const hasSchool=day=>{const k=ds(day);return(data.schoolEvents||[]).find(e=>e.date===k);};
      const toReview=data.pendingRequests.filter(r=>r.status==="pending"&&r.proposedBy!==curUser?.email);
      const myPend  =data.pendingRequests.filter(r=>r.status==="pending"&&r.proposedBy===curUser?.email);

      const mkReq=(type,d2,label)=>({id:Date.now(),type,proposedBy:curUser.email,proposedByName:curUser.name,proposedByAvatar:curUser.avatar,proposedByRole:curUser.role,createdAt:new Date().toISOString(),status:"pending",data:d2,label});

      const proposeCustody=day=>{
        const key=ds(day),cur=data.custodyDays[key];
        const cycle={undefined:"pai",null:"pai",pai:"mae",mae:"ambos",ambos:null};
        save({...data,pendingRequests:[...data.pendingRequests,mkReq("custody",{date:key,from:cur||null,to:cycle[cur]},`Guarda em ${key}: ${custodyLabel(cur)} → ${custodyLabel(cycle[cur])}`)]}); toast$("Proposta enviada!","info");
      };

      const approve=req=>{
        let nd={...data};
        nd.pendingRequests=data.pendingRequests.map(r=>r.id===req.id?{...r,status:"approved",resolvedBy:curUser.email,resolvedAt:new Date().toISOString()}:r);
        if(req.type==="custody"){const days={...data.custodyDays};if(!req.data.to)delete days[req.data.date];else days[req.data.date]=req.data.to;nd.custodyDays=days;}
        else if(req.type==="trip")nd.trips=[...data.trips,req.data];
        else if(req.type==="note")nd.notes=[req.data,...data.notes];
        else if(req.type==="expense")nd.expenses=[req.data,...data.expenses];
        save(nd); toast$("Aprovado! ✅","success");
      };
      const reject=req=>{ save({...data,pendingRequests:data.pendingRequests.map(r=>r.id===req.id?{...r,status:"rejected",resolvedBy:curUser.email,resolvedAt:new Date().toISOString()}:r)}); toast$("Recusado.","error"); };

      const addHR=(sec,rec)=>{ const hr={...data.healthRecords,[sec]:[{...rec,id:Date.now(),addedBy:curUser.name},...(data.healthRecords[sec]||[])]}; save({...data,healthRecords:hr}); setModal(null); setForm({}); toast$("Salvo!","success"); };
      const delHR=(sec,id)=>{ const hr={...data.healthRecords,[sec]:data.healthRecords[sec].filter(r=>r.id!==id)}; save({...data,healthRecords:hr}); };

      const saveHandoff=e=>{ e.preventDefault(); const ci=data.checklistTemplates.filter((_,i)=>form[`i${i}`]); const h={id:Date.now(),date:new Date().toISOString().split("T")[0],time:new Date().toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"}),from:curUser.name,fromAvatar:curUser.avatar,fromRole:curUser.role,mood:form.mood||"😊",notes:form.hn||"",checkedItems:ci,createdAt:new Date().toISOString()}; save({...data,handoffs:[h,...(data.handoffs||[])]}); setModal(null); setForm({}); toast$("Passagem registrada!","success"); };

      const addCLI=()=>{ if(!newCLItem.trim())return; save({...data,checklistTemplates:[...data.checklistTemplates,newCLItem.trim()]}); setNewCLItem(""); };
      const delCLI=idx=>save({...data,checklistTemplates:data.checklistTemplates.filter((_,i)=>i!==idx)});

      const extractAI=async()=>{
        if(!aiText.trim())return; setAiLoad(true); setAiRes(null);
        try{ const raw=await callClaude(`Analise o texto escolar e extraia eventos com datas.\nRetorne APENAS JSON:\n[{"title":"Nome","date":"YYYY-MM-DD","type":"reuniao|evento|feriado|avaliacao|outro","notes":"obs"}]\nHoje: ${new Date().toLocaleDateString("pt-BR")}.\nTexto:\n${aiText}`); setAiRes(JSON.parse(raw.replace(/```json|```/g,"").trim())); }
        catch{ toast$("Erro ao extrair. Tente novamente.","error"); }
        setAiLoad(false);
      };
      const confirmSchool=()=>{ const add=(aiRes||[]).filter((_,i)=>form[`ev${i}`]!==false).map(ev=>({...ev,id:Date.now()+Math.random(),addedBy:curUser.name})); save({...data,schoolEvents:[...(data.schoolEvents||[]),...add]}); setModal(null); setAiText(""); setAiRes(null); setForm({}); toast$(`${add.length} evento(s) adicionado(s)!`,"success"); };
      const addSchoolM=e=>{ e.preventDefault(); save({...data,schoolEvents:[{...form,id:Date.now(),addedBy:curUser.name},...(data.schoolEvents||[])]}); setModal(null); setForm({}); toast$("Evento adicionado!","success"); };
      const delSchool=id=>save({...data,schoolEvents:(data.schoolEvents||[]).filter(e=>e.id!==id)});

      const totExp=data.expenses.reduce((s,e)=>s+(e.amount||0),0);
      const paiExp=data.expenses.filter(e=>e.paidByRole?.startsWith("Pai")||e.paidBy==="Pai").reduce((s,e)=>s+e.amount,0);
      const maeExp=data.expenses.filter(e=>e.paidByRole?.startsWith("Mãe")||e.paidBy==="Mãe").reduce((s,e)=>s+e.amount,0);
      const uColor=curUser?roleColor(curUser.role):"#9CA3AF";

      const TABS=[
        {id:"calendario",icon:"📅",label:"Calendário"},
        {id:"saude",icon:"🏥",label:"Saúde"},
        {id:"passagem",icon:"🤝",label:"Passagem"},
        {id:"escola",icon:"🏫",label:"Escola"},
        {id:"viagens",icon:"✈️",label:"Viagens"},
        {id:"notas",icon:"💬",label:"Notas"},
        {id:"despesas",icon:"💰",label:"Despesas"},
        {id:"aprovacoes",icon:toReview.length>0?"🔴":"✅",label:toReview.length>0?`(${toReview.length})`:"OK"},
      ];

      const closeModal=()=>{setModal(null);setForm({});setAiText("");setAiRes(null);};

      if(screen==="loading") return <div style={{background:"#0A0A12",minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center"}}><div style={{textAlign:"center"}}><Logo size={60}/><p style={{fontSize:13,color:"#6B7280",marginTop:14}}>Carregando...</p></div></div>;

      if(screen==="login"||screen==="register"){
        const isReg=screen==="register",av=aForm.avatar,pr=av?derivedRole(av,aForm.roleOverride):null,isN=av&&av.role===null;
        return <div style={{background:"#0A0A12",minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",padding:"env(safe-area-inset-top,20px) 16px env(safe-area-inset-bottom,20px)"}}>
          <div style={{position:"fixed",inset:0,background:"radial-gradient(ellipse 60% 50% at 50% 0%,#1D4ED820 0%,transparent 70%)",pointerEvents:"none"}}/>
          {toast&&<Toast toast={toast}/>}
          <div style={{width:"100%",maxWidth:420,position:"relative",zIndex:1}}>
            <div style={{textAlign:"center",marginBottom:24}}>
              <Logo size={70}/>
              <h1 style={{margin:"10px 0 3px",fontSize:28,fontWeight:"bold",letterSpacing:"-1px"}}>Co<span style={{color:"#A78BFA"}}>Parent</span></h1>
              <p style={{margin:0,fontSize:11,color:"#6B7280"}}>Guarda compartilhada com harmonia</p>
            </div>
            <div style={{background:"#13131F",borderRadius:22,padding:22,border:"1px solid #ffffff10",boxShadow:"0 24px 60px #00000080"}}>
              <div style={{display:"flex",background:"#0A0A12",borderRadius:30,padding:3,marginBottom:20,border:"1px solid #ffffff0D"}}>
                {[["login","Entrar"],["register","Cadastrar"]].map(([s,l])=><button key={s} onClick={()=>{setScreen(s);setAuthErr("");}} style={{flex:1,border:"none",borderRadius:30,padding:"8px",cursor:"pointer",fontFamily:"Georgia,serif",fontSize:13,fontWeight:"bold",background:screen===s?"#F0EDE8":"transparent",color:screen===s?"#0A0A12":"#6B7280"}}>{l}</button>)}
              </div>
              <form onSubmit={isReg?doRegister:doLogin}>
                {isReg&&<div style={{marginBottom:13}}><label style={{fontSize:12,color:"#9CA3AF",display:"block",marginBottom:5}}>Nome</label><input type="text" value={aForm.name} onChange={e=>setAForm({...aForm,name:e.target.value})} placeholder="Ex: João Silva" required style={iS}/></div>}
                <div style={{marginBottom:13}}><label style={{fontSize:12,color:"#9CA3AF",display:"block",marginBottom:5}}>E-mail</label><input type="email" value={aForm.email} onChange={e=>setAForm({...aForm,email:e.target.value})} placeholder="seu@email.com" required style={iS}/></div>
                <div style={{marginBottom:13}}><label style={{fontSize:12,color:"#9CA3AF",display:"block",marginBottom:5}}>Senha</label><input type="password" value={aForm.password} onChange={e=>setAForm({...aForm,password:e.target.value})} placeholder={isReg?"Mínimo 6 caracteres":"Sua senha"} required style={iS}/></div>
                {isReg&&<div style={{marginBottom:16}}>
                  <label style={{fontSize:12,color:"#9CA3AF",display:"block",marginBottom:8}}>Avatar</label>
                  <div style={{display:"flex",gap:5}}>
                    {AVATAR_OPTIONS.map(o=>{const s=aForm.avatar?.emoji===o.emoji;return<button key={o.emoji} type="button" onClick={()=>setAForm({...aForm,avatar:o})} style={{flex:1,border:`2px solid ${s?"#A78BFA":"#ffffff15"}`,borderRadius:10,cursor:"pointer",background:s?"#A78BFA18":"transparent",padding:"7px 2px",display:"flex",flexDirection:"column",alignItems:"center",gap:2}}><span style={{fontSize:22}}>{o.emoji}</span><span style={{fontSize:8,color:s?"#A78BFA":"#6B7280"}}>{o.label}</span></button>;})}
                  </div>
                  {av&&<div style={{marginTop:10,padding:"8px 12px",background:"#0A0A12",borderRadius:9,border:"1px solid #ffffff0D",display:"flex",alignItems:"center",gap:10}}>
                    <span style={{fontSize:20}}>{av.emoji}</span>
                    {isN?<div style={{flex:1}}><p style={{margin:"0 0 6px",fontSize:11,color:"#9CA3AF"}}>Como quer ser chamado(a)?</p><div style={{display:"flex",gap:5}}>{["Pai","Mãe"].map(r=><button key={r} type="button" onClick={()=>setAForm({...aForm,roleOverride:r})} style={{flex:1,padding:"5px",border:`2px solid ${aForm.roleOverride===r?(r==="Pai"?C.pai:C.mae):"#ffffff15"}`,borderRadius:7,cursor:"pointer",fontFamily:"inherit",fontSize:12,fontWeight:"bold",background:aForm.roleOverride===r?(r==="Pai"?C.pai+"22":C.mae+"22"):"transparent",color:aForm.roleOverride===r?(r==="Pai"?C.pai:C.mae):"#6B7280"}}>{r}</button>)}</div></div>
                    :<div><p style={{margin:0,fontSize:11,color:"#9CA3AF"}}>Você será</p><p style={{margin:"1px 0 0",fontSize:14,fontWeight:"bold",color:pr?.startsWith("Pai")?C.pai:C.mae}}>{pr}</p></div>}
                  </div>}
                </div>}
                {authErr&&<div style={{background:"#4c051918",border:"1px solid #f43f5e50",borderRadius:9,padding:"9px 12px",marginBottom:12,fontSize:12,color:"#f43f5e"}}>⚠️ {authErr}</div>}
                <button type="submit" style={{width:"100%",padding:"12px",border:"none",borderRadius:12,cursor:"pointer",fontFamily:"Georgia,serif",fontSize:15,fontWeight:"bold",background:"linear-gradient(135deg,#1D4ED8,#7C3AED,#BE185D)",color:"#fff",marginTop:4}}>{isReg?"Criar Conta":"Entrar"}</button>
              </form>
            </div>
          </div>
        </div>;
      }

      // ── MAIN APP ──
      return <div style={{fontFamily:"Georgia,serif",minHeight:"100vh",background:"#0A0A12",color:"#F0EDE8",paddingBottom:"calc(env(safe-area-inset-bottom) + 8px)"}}>
        {toast&&<Toast toast={toast}/>}

        {/* Header */}
        <div style={{background:"linear-gradient(180deg,#13131F,#0F0F1A)",padding:`calc(env(safe-area-inset-top,0px) + 10px) 14px 0`,borderBottom:"1px solid #ffffff10",position:"sticky",top:0,zIndex:50}}>
          <div style={{maxWidth:700,margin:"0 auto"}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                <Logo size={34}/>
                <div><h1 style={{margin:0,fontSize:17,fontWeight:"bold",letterSpacing:"-0.5px"}}>Co<span style={{color:"#A78BFA"}}>Parent</span></h1><p style={{margin:0,fontSize:9,color:"#6B7280"}}>Guarda Compartilhada</p></div>
              </div>
              <div style={{display:"flex",alignItems:"center",gap:6}}>
                <div style={{background:uColor+"18",border:`1px solid ${uColor}35`,borderRadius:30,padding:"4px 10px",display:"flex",alignItems:"center",gap:5}}>
                  <span style={{fontSize:13}}>{curUser.avatar}</span>
                  <span style={{fontSize:11,fontWeight:"bold",color:uColor}}>{curUser.name}</span>
                </div>
                <button onClick={doLogout} style={{background:"#ffffff0D",border:"1px solid #ffffff10",color:"#6B7280",width:30,height:30,borderRadius:7,cursor:"pointer",fontSize:13}}>↩</button>
              </div>
            </div>
            {toReview.length>0&&<div onClick={()=>setTab("aprovacoes")} style={{background:"#78350f25",border:"1px solid #F59E0B50",borderRadius:8,padding:"6px 12px",marginBottom:8,cursor:"pointer",display:"flex",alignItems:"center",gap:8,fontSize:12}}><span>⏳</span><strong style={{color:"#F59E0B"}}>{toReview.length} proposta{toReview.length>1?"s":""} aguardando</strong><span style={{color:"#6B7280",marginLeft:"auto",fontSize:11}}>Ver →</span></div>}
            <div style={{display:"flex",gap:1,overflowX:"auto",WebkitOverflowScrolling:"touch",scrollbarWidth:"none"}}>
              {TABS.map(t=><button key={t.id} onClick={()=>setTab(t.id)} style={{padding:"6px 8px",border:"none",borderRadius:"7px 7px 0 0",cursor:"pointer",fontSize:10,fontFamily:"Georgia,serif",whiteSpace:"nowrap",background:tab===t.id?"#F0EDE8":"transparent",color:tab===t.id?"#0A0A12":"#6B7280",fontWeight:tab===t.id?"bold":"normal",flexShrink:0}}>{t.icon}{tab===t.id?" "+t.label:""}</button>)}
            </div>
          </div>
        </div>

        <div style={{maxWidth:700,margin:"0 auto",padding:"16px 14px"}}>

          {/* CALENDÁRIO */}
          {tab==="calendario"&&<div>
            <div style={{display:"flex",gap:8,marginBottom:8,flexWrap:"wrap",alignItems:"center"}}>
              {[["pai","Pai",C.pai],["mae","Mãe",C.mae],["ambos","Ambos",C.ambos]].map(([k,l,c])=><div key={k} style={{display:"flex",alignItems:"center",gap:4,fontSize:11,color:"#9CA3AF"}}><div style={{width:8,height:8,borderRadius:2,background:c}}/>{l}</div>)}
              <div style={{fontSize:10,color:"#4B5563",marginLeft:"auto",fontStyle:"italic"}}>Toque p/ propor</div>
            </div>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>
              <button onClick={()=>setCurDate(new Date(yr,mo-1,1))} style={navBtn}>‹</button>
              <h2 style={{margin:0,fontSize:15,fontWeight:"bold"}}>{MONTHS_PT[mo]} {yr}</h2>
              <button onClick={()=>setCurDate(new Date(yr,mo+1,1))} style={navBtn}>›</button>
            </div>
            <div style={{background:"#13131F",borderRadius:12,overflow:"hidden",border:"1px solid #ffffff0D"}}>
              <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)"}}>
                {DAYS_PT.map(d=><div key={d} style={{padding:"5px 2px",textAlign:"center",fontSize:9,color:"#4B5563",fontWeight:"bold"}}>{d}</div>)}
                {Array(firstDay).fill(null).map((_,i)=><div key={`e${i}`}/>)}
                {Array(daysInMo).fill(null).map((_,i)=>{
                  const day=i+1,k=ds(day),custody=data.custodyDays[k];
                  const pend=pendingDay(day),trip=hasTrip(day),school=hasSchool(day);
                  const today=new Date().toDateString()===new Date(yr,mo,day).toDateString();
                  return <div key={day} onClick={()=>proposeCustody(day)} style={{padding:"3px 2px",textAlign:"center",cursor:"pointer",position:"relative",background:custody?bgColor(custody)+"28":"transparent",borderTop:"1px solid #ffffff06"}}>
                    {trip&&<div style={{position:"absolute",top:1,right:1,width:4,height:4,borderRadius:"50%",background:C.viagem}}/>}
                    {school&&<div style={{position:"absolute",top:1,left:1,width:4,height:4,borderRadius:"50%",background:"#10b981"}}/>}
                    {pend&&<div style={{position:"absolute",bottom:1,right:1,width:4,height:4,borderRadius:"50%",background:"#F59E0B"}}/>}
                    <div style={{width:26,height:26,borderRadius:"50%",margin:"0 auto",display:"flex",alignItems:"center",justifyContent:"center",background:pend?"#F59E0B20":custody?bgColor(custody):"transparent",border:today?"2px solid #F0EDE8":pend?"1.5px dashed #F59E0B":"none",fontSize:11,fontWeight:today?"bold":"normal",color:custody?"#fff":"#F0EDE8"}}>{day}</div>
                  </div>;
                })}
              </div>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginTop:10}}>
              {["pai","mae","ambos"].map(who=>{
                const count=Object.entries(data.custodyDays).filter(([k,v])=>k.startsWith(`${yr}-${String(mo+1).padStart(2,"0")}`)&&v===who).length;
                return <div key={who} style={{background:bgColor(who)+"18",border:`1px solid ${bgColor(who)}35`,borderRadius:10,padding:10,textAlign:"center"}}><div style={{fontSize:12,color:bgColor(who),fontWeight:"bold"}}>{who==="pai"?"Pai":who==="mae"?"Mãe":"Juntos"}</div><div style={{fontSize:20,fontWeight:"bold",color:bgColor(who)}}>{count}</div><div style={{fontSize:9,color:"#6B7280"}}>dias</div></div>;
              })}
            </div>
          </div>}

          {/* SAÚDE */}
          {tab==="saude"&&<div>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
              <h2 style={{margin:0,fontSize:16}}>🏥 Caderneta de Saúde</h2>
              <button onClick={()=>{setModal(`saude_${hTab}`);setForm({});}} style={addBtn}>+ Add</button>
            </div>
            <div style={{display:"flex",gap:3,marginBottom:12,background:"#13131F",borderRadius:10,padding:3}}>
              {[["vacinas","💉"],["consultas","🩺"],["medicamentos","💊"],["alergias","⚠️"]].map(([k,l])=><button key={k} onClick={()=>setHTab(k)} style={{flex:1,border:"none",borderRadius:7,padding:"6px 2px",cursor:"pointer",fontFamily:"Georgia,serif",fontSize:11,fontWeight:"bold",background:hTab===k?"#F0EDE8":"transparent",color:hTab===k?"#0A0A12":"#6B7280"}}>{l}</button>)}
            </div>
            {hTab==="vacinas"&&((data.healthRecords.vaccines||[]).length===0?<EmptyState emoji="💉" text="Nenhuma vacina registrada"/>:(data.healthRecords.vaccines||[]).map(v=><div key={v.id} style={{background:"#13131F",border:"1px solid #10b98120",borderRadius:11,padding:13,marginBottom:7}}>
              <div style={{display:"flex",justifyContent:"space-between"}}><div><div style={{fontSize:13,fontWeight:"bold"}}>💉 {v.name}</div><div style={{fontSize:11,color:"#9CA3AF",marginTop:3}}>📅 {v.date}</div>{v.nextDose&&<div style={{fontSize:11,color:"#F59E0B",marginTop:2}}>⏰ Próxima: {v.nextDose}</div>}{v.notes&&<div style={{fontSize:11,color:"#6B7280",marginTop:2}}>{v.notes}</div>}<div style={{fontSize:10,color:"#4B5563",marginTop:3}}>Por {v.addedBy}</div></div><button onClick={()=>delHR("vaccines",v.id)} style={{background:"none",border:"none",color:"#4B5563",cursor:"pointer",fontSize:18,padding:"0 4px"}}>×</button></div>
            </div>))}
            {hTab==="consultas"&&((data.healthRecords.consultations||[]).length===0?<EmptyState emoji="🩺" text="Nenhuma consulta registrada"/>:(data.healthRecords.consultations||[]).map(c=><div key={c.id} style={{background:"#13131F",border:"1px solid #3B82F620",borderRadius:11,padding:13,marginBottom:7}}>
              <div style={{display:"flex",justifyContent:"space-between"}}><div><div style={{fontSize:13,fontWeight:"bold"}}>🩺 {c.specialty}</div><div style={{fontSize:11,color:"#9CA3AF",marginTop:3}}>👨‍⚕️ {c.doctor} · {c.date}</div>{c.diagnosis&&<div style={{fontSize:11,color:"#D1D5DB",marginTop:2}}>{c.diagnosis}</div>}{c.prescription&&<div style={{fontSize:11,color:"#A78BFA",marginTop:2}}>💊 {c.prescription}</div>}{c.nextAppointment&&<div style={{fontSize:11,color:"#F59E0B",marginTop:2}}>⏰ Retorno: {c.nextAppointment}</div>}<div style={{fontSize:10,color:"#4B5563",marginTop:3}}>Por {c.addedBy}</div></div><button onClick={()=>delHR("consultations",c.id)} style={{background:"none",border:"none",color:"#4B5563",cursor:"pointer",fontSize:18,padding:"0 4px"}}>×</button></div>
            </div>))}
            {hTab==="medicamentos"&&((data.healthRecords.medications||[]).length===0?<EmptyState emoji="💊" text="Nenhum medicamento"/>:(data.healthRecords.medications||[]).map(m=><div key={m.id} style={{background:"#13131F",border:"1px solid #8B5CF620",borderRadius:11,padding:13,marginBottom:7}}>
              <div style={{display:"flex",justifyContent:"space-between"}}><div><div style={{fontSize:13,fontWeight:"bold"}}>💊 {m.name}</div><div style={{fontSize:12,color:"#A78BFA",marginTop:3}}>{m.dosage} · {m.frequency}</div>{m.indication&&<div style={{fontSize:11,color:"#9CA3AF",marginTop:2}}>{m.indication}</div>}<div style={{fontSize:10,color:"#4B5563",marginTop:3}}>Por {m.addedBy}</div></div><button onClick={()=>delHR("medications",m.id)} style={{background:"none",border:"none",color:"#4B5563",cursor:"pointer",fontSize:18,padding:"0 4px"}}>×</button></div>
            </div>))}
            {hTab==="alergias"&&((data.healthRecords.allergies||[]).length===0?<EmptyState emoji="⚠️" text="Nenhuma alergia"/>:(data.healthRecords.allergies||[]).map(a=><div key={a.id} style={{background:"#13131F",borderLeft:"4px solid #E11048",border:"1px solid #E1104820",borderRadius:11,padding:13,marginBottom:7}}>
              <div style={{display:"flex",justifyContent:"space-between"}}><div><div style={{fontSize:13,fontWeight:"bold",color:"#f43f5e"}}>⚠️ {a.name}</div><div style={{fontSize:11,color:"#9CA3AF",marginTop:3}}>{a.type} · <span style={{color:a.severity==="grave"?"#f43f5e":a.severity==="moderada"?"#F59E0B":"#10b981"}}>{a.severity}</span></div>{a.action&&<div style={{fontSize:11,color:"#D1D5DB",marginTop:2}}>{a.action}</div>}<div style={{fontSize:10,color:"#4B5563",marginTop:3}}>Por {a.addedBy}</div></div><button onClick={()=>delHR("allergies",a.id)} style={{background:"none",border:"none",color:"#4B5563",cursor:"pointer",fontSize:18,padding:"0 4px"}}>×</button></div>
            </div>))}
          </div>}

          {/* PASSAGEM */}
          {tab==="passagem"&&<div>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
              <h2 style={{margin:0,fontSize:16}}>🤝 Passagem de Guarda</h2>
              <div style={{display:"flex",gap:6}}>
                <button onClick={()=>setEditCL(!editCL)} style={{...addBtn,background:"#ffffff0D",color:"#9CA3AF",border:"1px solid #ffffff10"}}>⚙️</button>
                <button onClick={()=>{setModal("handoff");setForm({mood:"😊"});}} style={addBtn}>+ Check-in</button>
              </div>
            </div>
            {editCL&&<div style={{background:"#13131F",borderRadius:11,padding:13,marginBottom:12,border:"1px solid #ffffff0D"}}>
              <p style={{margin:"0 0 8px",fontSize:12,color:"#9CA3AF"}}>Itens do checklist:</p>
              {data.checklistTemplates.map((item,idx)=><div key={idx} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"4px 0",borderBottom:"1px solid #ffffff06"}}><span style={{fontSize:12}}>{item}</span><button onClick={()=>delCLI(idx)} style={{background:"none",border:"none",color:"#4B5563",cursor:"pointer",fontSize:15}}>×</button></div>)}
              <div style={{display:"flex",gap:7,marginTop:9}}><input value={newCLItem} onChange={e=>setNewCLItem(e.target.value)} placeholder="Novo item..." onKeyDown={e=>e.key==="Enter"&&(e.preventDefault(),addCLI())} style={{...iS,flex:1,padding:"7px 10px"}}/><button onClick={addCLI} style={addBtn}>+</button></div>
            </div>}
            {(data.handoffs||[]).length===0?<EmptyState emoji="🤝" text="Nenhuma passagem registrada"/>:
            (data.handoffs||[]).map(h=><div key={h.id} style={{background:"#13131F",border:"1px solid #ffffff0D",borderRadius:11,padding:13,marginBottom:7}}>
              <div style={{display:"flex",alignItems:"center",gap:7,marginBottom:7}}>
                <span style={{fontSize:17}}>{h.fromAvatar}</span>
                <div><div style={{fontSize:12,fontWeight:"bold"}}>{h.from} <span style={{color:"#6B7280",fontWeight:"normal",fontSize:10}}>({h.fromRole})</span></div><div style={{fontSize:10,color:"#6B7280"}}>📅 {h.date} {h.time}</div></div>
                <div style={{marginLeft:"auto",fontSize:20}}>{h.mood}</div>
              </div>
              {h.checkedItems.length>0&&<div style={{display:"flex",flexWrap:"wrap",gap:4,marginBottom:7}}>{h.checkedItems.map((item,i)=><span key={i} style={{fontSize:10,background:"#10b98115",color:"#10b981",padding:"2px 6px",borderRadius:20}}>✓ {item}</span>)}</div>}
              {h.notes&&<div style={{fontSize:11,color:"#9CA3AF",borderTop:"1px solid #ffffff06",paddingTop:7}}>📝 {h.notes}</div>}
            </div>)}
          </div>}

          {/* ESCOLA */}
          {tab==="escola"&&<div>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
              <h2 style={{margin:0,fontSize:16}}>🏫 Agenda Escolar</h2>
              <div style={{display:"flex",gap:5}}>
                <button onClick={()=>{setModal("escola_ai");setAiText("");setAiRes(null);setForm({});}} style={{...addBtn,background:"linear-gradient(135deg,#7C3AED,#A78BFA)"}}>🤖 IA</button>
                <button onClick={()=>{setModal("escola_manual");setForm({type:"evento"});}} style={addBtn}>+ Manual</button>
              </div>
            </div>
            {(data.schoolEvents||[]).length===0?<EmptyState emoji="🏫" text="Nenhum evento escolar"/>:
            (()=>{
              const evs=[...(data.schoolEvents||[])].sort((a,b)=>a.date>b.date?1:-1);
              const g={};evs.forEach(e=>{const[y2,m2]=e.date.split("-");const k=`${y2}-${m2}`;if(!g[k])g[k]=[];g[k].push(e);});
              return Object.entries(g).map(([key,evs2])=>{const[y2,m2]=key.split("-");return<div key={key} style={{marginBottom:12}}>
                <div style={{fontSize:9,color:"#6B7280",fontWeight:"bold",letterSpacing:1,marginBottom:7}}>{MONTHS_PT[parseInt(m2)-1].toUpperCase()} {y2}</div>
                {evs2.map(ev=><div key={ev.id} style={{background:"#13131F",border:"1px solid #ffffff0D",borderRadius:9,padding:"9px 11px",marginBottom:4,display:"flex",alignItems:"center",gap:7}}>
                  <div style={{fontSize:17}}>{schoolTypeMap[ev.type]||"📌"}</div>
                  <div style={{flex:1}}><div style={{fontSize:12,fontWeight:"bold"}}>{ev.title}</div><div style={{fontSize:10,color:"#6B7280"}}>📅 {ev.date}{ev.notes?` · ${ev.notes}`:""}</div></div>
                  <button onClick={()=>delSchool(ev.id)} style={{background:"none",border:"none",color:"#4B5563",cursor:"pointer",fontSize:15}}>×</button>
                </div>)}
              </div>;})
            })()}
          </div>}

          {/* VIAGENS */}
          {tab==="viagens"&&<div>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
              <h2 style={{margin:0,fontSize:16}}>Viagens</h2>
              <button onClick={()=>{setModal("trip");setForm({with:"pai"});}} style={addBtn}>+ Propor</button>
            </div>
            {data.trips.length===0&&myPend.filter(r=>r.type==="trip").length===0&&<EmptyState emoji="✈️" text="Nenhuma viagem"/>}
            {[...myPend.filter(r=>r.type==="trip").map(r=>({...r.data,_p:true})),...data.trips].map(t=><div key={t.id} style={{background:"#13131F",borderLeft:`4px solid ${t._p?"#F59E0B":"#F59E0B55"}`,border:`1px solid ${t._p?"#F59E0B35":"#F59E0B20"}`,borderRadius:11,padding:13,marginBottom:7}}>
              <div style={{display:"flex",gap:7,alignItems:"center"}}>✈️<strong>{t.title}</strong>{t._p&&<span style={{fontSize:9,color:"#F59E0B",background:"#F59E0B12",padding:"2px 6px",borderRadius:20}}>Pendente</span>}</div>
              <div style={{fontSize:11,color:"#9CA3AF",marginTop:4}}>📅 {t.startDate} → {t.endDate}</div>
              {t.notes&&<div style={{fontSize:11,color:"#D1D5DB",marginTop:3}}>📝 {t.notes}</div>}
            </div>)}
          </div>}

          {/* NOTAS */}
          {tab==="notas"&&<div>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
              <h2 style={{margin:0,fontSize:16}}>Notas</h2>
              <button onClick={()=>{setModal("note");setForm({});}} style={addBtn}>+ Escrever</button>
            </div>
            {data.notes.length===0&&myPend.filter(r=>r.type==="note").length===0&&<EmptyState emoji="💬" text="Nenhuma nota"/>}
            {[...myPend.filter(r=>r.type==="note").map(r=>({...r.data,_p:true})),...data.notes].map(n=><div key={n.id} style={{background:n.role?.startsWith("Pai")?"#0e1929":"#1a0e1a",border:`1px solid ${n.role?.startsWith("Pai")?"#3B82F620":"#EC489820"}`,borderRadius:11,padding:13,marginBottom:7}}>
              <div style={{display:"flex",gap:5,alignItems:"center",marginBottom:5}}><span style={{fontSize:15}}>{n.avatar||"🧑"}</span><strong style={{color:n.role?.startsWith("Pai")?C.pai:C.mae,fontSize:11}}>{n.author}</strong><span style={{fontSize:10,color:"#6B7280"}}>{n.date}</span>{n._p&&<span style={{fontSize:9,color:"#F59E0B",background:"#F59E0B12",padding:"1px 5px",borderRadius:20}}>Pendente</span>}</div>
              <p style={{margin:0,fontSize:12,lineHeight:1.6,color:"#D1D5DB"}}>{n.text}</p>
            </div>)}
          </div>}

          {/* DESPESAS */}
          {tab==="despesas"&&<div>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
              <h2 style={{margin:0,fontSize:16}}>Despesas</h2>
              <button onClick={()=>{setModal("expense");setForm({paidBy:curUser.role,category:"Educação"});}} style={addBtn}>+ Nova</button>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:7,marginBottom:12}}>
              <SC label="Total" value={totExp} color="#F0EDE8"/><SC label="Pai" value={paiExp} color={C.pai}/><SC label="Mãe" value={maeExp} color={C.mae}/>
            </div>
            {data.expenses.length===0&&<EmptyState emoji="💰" text="Nenhuma despesa"/>}
            {[...myPend.filter(r=>r.type==="expense").map(r=>({...r.data,_p:true})),...data.expenses].map(ex=><div key={ex.id} style={{background:"#13131F",border:"1px solid #ffffff08",borderRadius:9,padding:"9px 11px",display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:5}}>
              <div>
                <div style={{display:"flex",gap:4,alignItems:"center",marginBottom:2}}><span style={{fontSize:9,background:"#ffffff0D",padding:"1px 5px",borderRadius:20,color:"#9CA3AF"}}>{ex.category}</span>{ex._p&&<span style={{fontSize:9,color:"#F59E0B",background:"#F59E0B12",padding:"1px 5px",borderRadius:20}}>Pendente</span>}<span style={{fontSize:9,color:"#6B7280"}}>{ex.date}</span></div>
                <div style={{fontSize:12}}>{ex.description}</div>
                <div style={{fontSize:10,color:(ex.paidByRole?.startsWith("Pai")||ex.paidBy==="Pai")?C.pai:C.mae,marginTop:2}}>{ex.paidByAvatar||"🧑"} {ex.paidByName||ex.paidBy}{ex.shared?" · Dividido":""}</div>
              </div>
              <strong style={{fontSize:13}}>R$ {ex.amount?.toFixed(2)}</strong>
            </div>)}
          </div>}

          {/* APROVAÇÕES */}
          {tab==="aprovacoes"&&<div>
            <h2 style={{margin:"0 0 16px",fontSize:16}}>Central de Aprovações</h2>
            {toReview.length>0&&<div style={{marginBottom:18}}>
              <div style={{fontSize:10,color:"#F59E0B",fontWeight:"bold",letterSpacing:1,marginBottom:8}}>⏳ AGUARDANDO SUA APROVAÇÃO</div>
              {toReview.map(req=><div key={req.id} style={{background:"#13131F",border:"1px solid #F59E0B35",borderLeft:"4px solid #F59E0B",borderRadius:11,padding:13,marginBottom:9}}>
                <div style={{display:"flex",gap:6,alignItems:"center",marginBottom:5,flexWrap:"wrap"}}><span style={{fontSize:17}}>{req.proposedByAvatar}</span><span style={{fontSize:10,background:"#F59E0B18",color:"#F59E0B",padding:"2px 6px",borderRadius:20}}>{typeLabel(req.type)}</span><span style={{fontSize:10,color:"#6B7280"}}>por {req.proposedByName}</span></div>
                <div style={{fontSize:12,color:"#D1D5DB",marginBottom:3}}>{req.label}</div>
                {req.type==="custody"&&<div style={{fontSize:11,color:"#9CA3AF",marginBottom:3}}>Dia <strong style={{color:"#F0EDE8"}}>{req.data.date}</strong>: {custodyTagEl(req.data.from)} → {custodyTagEl(req.data.to)}</div>}
                <div style={{display:"flex",gap:7,marginTop:10}}>
                  <button onClick={()=>approve(req)} style={{...addBtn,background:"linear-gradient(135deg,#059669,#10b981)",flex:1,padding:"9px"}}>✅ Aprovar</button>
                  <button onClick={()=>reject(req)} style={{...addBtn,background:"linear-gradient(135deg,#9f1239,#e11d48)",flex:1,padding:"9px"}}>❌ Recusar</button>
                </div>
              </div>)}
            </div>}
            {myPend.length>0&&<div style={{marginBottom:18}}>
              <div style={{fontSize:10,color:"#9CA3AF",fontWeight:"bold",letterSpacing:1,marginBottom:8}}>🕐 SUAS PROPOSTAS</div>
              {myPend.map(req=><div key={req.id} style={{background:"#13131F",border:"1px solid #ffffff0D",borderRadius:9,padding:"9px 11px",display:"flex",gap:7,alignItems:"center",marginBottom:5}}><span style={{fontSize:15}}>{req.proposedByAvatar}</span><div style={{flex:1}}><div style={{fontSize:11}}>{req.label}</div><div style={{fontSize:9,color:"#6B7280"}}>{new Date(req.createdAt).toLocaleString("pt-BR")}</div></div><span style={{fontSize:9,color:"#F59E0B",background:"#F59E0B18",padding:"2px 7px",borderRadius:20}}>Pendente</span></div>)}
            </div>}
            {data.pendingRequests.filter(r=>r.status!=="pending").length>0&&<div>
              <div style={{fontSize:10,color:"#4B5563",fontWeight:"bold",letterSpacing:1,marginBottom:8}}>📋 HISTÓRICO</div>
              {data.pendingRequests.filter(r=>r.status!=="pending").sort((a,b)=>b.resolvedAt>a.resolvedAt?1:-1).slice(0,12).map(req=><div key={req.id} style={{background:"#13131F",border:"1px solid #ffffff08",borderRadius:9,padding:"7px 11px",display:"flex",gap:7,alignItems:"center",marginBottom:4}}><span style={{fontSize:13}}>{req.proposedByAvatar}</span><div style={{flex:1}}><div style={{fontSize:10,color:"#9CA3AF"}}>{req.label}</div><div style={{fontSize:9,color:"#4B5563"}}>por {req.proposedByName} · {new Date(req.createdAt).toLocaleDateString("pt-BR")}</div></div><span style={{fontSize:9,padding:"2px 6px",borderRadius:20,background:req.status==="approved"?"#064e3b":"#4c0519",color:req.status==="approved"?"#10b981":"#f43f5e"}}>{req.status==="approved"?"✅":"❌"}</span></div>)}
            </div>}
            {toReview.length===0&&myPend.length===0&&data.pendingRequests.length===0&&<EmptyState emoji="✅" text="Tudo em dia!"/>}
          </div>}
        </div>

        {/* MODALS */}
        {modal&&<div style={{position:"fixed",inset:0,background:"#00000095",display:"flex",alignItems:"flex-end",justifyContent:"center",zIndex:100,padding:`0 0 env(safe-area-inset-bottom,0px)`}} onClick={e=>{if(e.target===e.currentTarget)closeModal();}}>
          <div style={{background:"#13131F",borderRadius:"18px 18px 0 0",padding:"18px 18px calc(env(safe-area-inset-bottom,0px) + 18px)",width:"100%",maxWidth:500,border:"1px solid #ffffff12",maxHeight:"88vh",overflowY:"auto"}}>
            <div style={{width:38,height:4,background:"#ffffff20",borderRadius:2,margin:"0 auto 14px"}}/>

            {modal==="trip"&&<form onSubmit={e=>{e.preventDefault();save({...data,pendingRequests:[...data.pendingRequests,mkReq("trip",{...form,id:Date.now()+1},`Viagem: ${form.title} (${form.startDate} → ${form.endDate})`)]});closeModal();toast$("Proposta enviada!","info");}}>
              <h3 style={{margin:"0 0 14px",fontSize:15}}>✈️ Propor Viagem</h3>
              <FI label="Destino" value={form.title||""} onChange={v=>setForm({...form,title:v})} required/>
              <FI label="Início" type="date" value={form.startDate||""} onChange={v=>setForm({...form,startDate:v})} required/>
              <FI label="Fim" type="date" value={form.endDate||""} onChange={v=>setForm({...form,endDate:v})} required/>
              <FS label="Quem vai" value={form.with||"pai"} onChange={v=>setForm({...form,with:v})} options={[["pai","Pai"],["mae","Mãe"],["ambos","Família toda"]]}/>
              <FI label="Observações" value={form.notes||""} onChange={v=>setForm({...form,notes:v})}/>
              <MB onCancel={closeModal} submitLabel="Enviar Proposta"/>
            </form>}

            {modal==="note"&&<form onSubmit={e=>{e.preventDefault();const nd2={id:Date.now()+1,date:new Date().toISOString().split("T")[0],author:curUser.name,role:curUser.role,avatar:curUser.avatar,text:form.text};save({...data,pendingRequests:[...data.pendingRequests,mkReq("note",nd2,`Nota de ${curUser.name}...`)]});closeModal();toast$("Nota enviada!","info");}}>
              <h3 style={{margin:"0 0 14px",fontSize:15}}>💬 Escrever Nota</h3>
              <div style={{marginBottom:13}}><label style={{fontSize:12,color:"#9CA3AF",display:"block",marginBottom:5}}>Mensagem</label><textarea required value={form.text||""} onChange={e=>setForm({...form,text:e.target.value})} rows={4} style={{...iS,resize:"vertical"}} placeholder="Digite sua mensagem..."/></div>
              <MB onCancel={closeModal} submitLabel="Enviar para Aprovação"/>
            </form>}

            {modal==="expense"&&<form onSubmit={e=>{e.preventDefault();const ed={id:Date.now()+1,...form,amount:parseFloat(form.amount)||0,date:form.date||new Date().toISOString().split("T")[0],paidByName:curUser.name,paidByAvatar:curUser.avatar,paidByRole:curUser.role};if(!form.shared){save({...data,expenses:[ed,...data.expenses]});closeModal();toast$("Registrada!","success");return;}save({...data,pendingRequests:[...data.pendingRequests,mkReq("expense",ed,`Despesa: ${form.description} — R$ ${parseFloat(form.amount||0).toFixed(2)}`)]});closeModal();toast$("Enviada para aprovação.","info");}}>
              <h3 style={{margin:"0 0 14px",fontSize:15}}>💰 Nova Despesa</h3>
              <FS label="Categoria" value={form.category||"Educação"} onChange={v=>setForm({...form,category:v})} options={[["Educação","Educação"],["Saúde","Saúde"],["Alimentação","Alimentação"],["Lazer","Lazer"],["Vestuário","Vestuário"],["Outro","Outro"]]}/>
              <FI label="Descrição" value={form.description||""} onChange={v=>setForm({...form,description:v})} required/>
              <FI label="Valor (R$)" type="number" step="0.01" value={form.amount||""} onChange={v=>setForm({...form,amount:v})} required/>
              <FS label="Quem pagou" value={form.paidBy||curUser.role} onChange={v=>setForm({...form,paidBy:v})} options={[["Pai","Pai"],["Mãe","Mãe"]]}/>
              <FI label="Data" type="date" value={form.date||new Date().toISOString().split("T")[0]} onChange={v=>setForm({...form,date:v})}/>
              <div style={{marginBottom:12}}><label style={{display:"flex",alignItems:"center",gap:7,cursor:"pointer",fontSize:12,color:"#D1D5DB"}}><input type="checkbox" checked={!!form.shared} onChange={e=>setForm({...form,shared:e.target.checked})}/>Despesa compartilhada (requer aprovação)</label></div>
              <MB onCancel={closeModal} submitLabel={form.shared?"Enviar para Aprovação":"Registrar"}/>
            </form>}

            {modal==="saude_vacinas"&&<form onSubmit={e=>{e.preventDefault();addHR("vaccines",form);}}><h3 style={{margin:"0 0 14px",fontSize:15}}>💉 Nova Vacina</h3><FI label="Nome da vacina" value={form.name||""} onChange={v=>setForm({...form,name:v})} required/><FI label="Data de aplicação" type="date" value={form.date||""} onChange={v=>setForm({...form,date:v})} required/><FI label="Próxima dose" type="date" value={form.nextDose||""} onChange={v=>setForm({...form,nextDose:v})}/><FI label="Observações" value={form.notes||""} onChange={v=>setForm({...form,notes:v})}/><MB onCancel={closeModal}/></form>}
            {modal==="saude_consultas"&&<form onSubmit={e=>{e.preventDefault();addHR("consultations",form);}}><h3 style={{margin:"0 0 14px",fontSize:15}}>🩺 Nova Consulta</h3><FI label="Especialidade" value={form.specialty||""} onChange={v=>setForm({...form,specialty:v})} required placeholder="Ex: Pediatria"/><FI label="Médico(a)" value={form.doctor||""} onChange={v=>setForm({...form,doctor:v})} required/><FI label="Data" type="date" value={form.date||""} onChange={v=>setForm({...form,date:v})} required/><FI label="Diagnóstico" value={form.diagnosis||""} onChange={v=>setForm({...form,diagnosis:v})}/><FI label="Receita" value={form.prescription||""} onChange={v=>setForm({...form,prescription:v})}/><FI label="Retorno" type="date" value={form.nextAppointment||""} onChange={v=>setForm({...form,nextAppointment:v})}/><MB onCancel={closeModal}/></form>}
            {modal==="saude_medicamentos"&&<form onSubmit={e=>{e.preventDefault();addHR("medications",form);}}><h3 style={{margin:"0 0 14px",fontSize:15}}>💊 Medicamento Contínuo</h3><FI label="Nome" value={form.name||""} onChange={v=>setForm({...form,name:v})} required/><FI label="Dosagem" value={form.dosage||""} onChange={v=>setForm({...form,dosage:v})} required placeholder="Ex: 5mg"/><FI label="Frequência" value={form.frequency||""} onChange={v=>setForm({...form,frequency:v})} required placeholder="Ex: 1x ao dia"/><FI label="Indicação" value={form.indication||""} onChange={v=>setForm({...form,indication:v})}/><FI label="Início" type="date" value={form.startDate||""} onChange={v=>setForm({...form,startDate:v})}/><MB onCancel={closeModal}/></form>}
            {modal==="saude_alergias"&&<form onSubmit={e=>{e.preventDefault();addHR("allergies",form);}}><h3 style={{margin:"0 0 14px",fontSize:15}}>⚠️ Alergia / Condição</h3><FI label="Nome" value={form.name||""} onChange={v=>setForm({...form,name:v})} required placeholder="Ex: Amendoim, Asma"/><FS label="Tipo" value={form.type||"alergia alimentar"} onChange={v=>setForm({...form,type:v})} options={[["alergia alimentar","Alergia alimentar"],["alergia medicamentosa","Alergia medicamentosa"],["alergia ambiental","Alergia ambiental"],["condição crônica","Condição crônica"],["outro","Outro"]]}/><FS label="Gravidade" value={form.severity||"leve"} onChange={v=>setForm({...form,severity:v})} options={[["leve","Leve"],["moderada","Moderada"],["grave","Grave"]]}/><FI label="Conduta de emergência" value={form.action||""} onChange={v=>setForm({...form,action:v})} placeholder="Ex: Acionar epipen"/><MB onCancel={closeModal}/></form>}

            {modal==="handoff"&&<form onSubmit={saveHandoff}>
              <h3 style={{margin:"0 0 14px",fontSize:15}}>🤝 Registrar Passagem</h3>
              <div style={{marginBottom:13}}><label style={{fontSize:12,color:"#9CA3AF",display:"block",marginBottom:7}}>Como a criança está?</label><div style={{display:"flex",gap:7}}>{["😊","😄","😐","😢","😴","🤒"].map(m=><button key={m} type="button" onClick={()=>setForm({...form,mood:m})} style={{width:38,height:38,border:`2px solid ${form.mood===m?"#A78BFA":"#ffffff15"}`,borderRadius:9,cursor:"pointer",fontSize:19,background:form.mood===m?"#A78BFA18":"transparent"}}>{m}</button>)}</div></div>
              <div style={{marginBottom:13}}><label style={{fontSize:12,color:"#9CA3AF",display:"block",marginBottom:7}}>✅ Itens entregues</label><div style={{display:"flex",flexDirection:"column",gap:5}}>{data.checklistTemplates.map((item,idx)=><label key={idx} style={{display:"flex",alignItems:"center",gap:7,cursor:"pointer",fontSize:12,color:"#D1D5DB"}}><input type="checkbox" checked={!!form[`i${idx}`]} onChange={e=>setForm({...form,[`i${idx}`]:e.target.checked})}/>{item}</label>)}</div></div>
              <div style={{marginBottom:13}}><label style={{fontSize:12,color:"#9CA3AF",display:"block",marginBottom:5}}>Observações</label><textarea value={form.hn||""} onChange={e=>setForm({...form,hn:e.target.value})} rows={3} style={{...iS,resize:"vertical"}} placeholder="Ex: dormiu mal, tem prova amanhã..."/></div>
              <MB onCancel={closeModal} submitLabel="Registrar"/>
            </form>}

            {modal==="escola_ai"&&<div>
              <h3 style={{margin:"0 0 6px",fontSize:15}}>🤖 Importar com IA</h3>
              <p style={{fontSize:11,color:"#6B7280",margin:"0 0 12px",lineHeight:1.6}}>Cole o texto do e-mail ou do calendário escolar (copiado do PDF). A IA extrai os eventos automaticamente.</p>
              <div style={{marginBottom:11}}><label style={{fontSize:12,color:"#9CA3AF",display:"block",marginBottom:5}}>Texto</label><textarea value={aiText} onChange={e=>setAiText(e.target.value)} rows={6} style={{...iS,resize:"vertical"}} placeholder="Cole aqui o conteúdo..."/></div>
              {!aiRes&&<button onClick={extractAI} disabled={aiLoad||!aiText.trim()} style={{...addBtn,width:"100%",padding:"11px",background:"linear-gradient(135deg,#7C3AED,#A78BFA)",opacity:aiLoad||!aiText.trim()?0.5:1,marginBottom:7}}>{aiLoad?"⏳ Extraindo...":"✨ Extrair Eventos com IA"}</button>}
              {aiRes&&<div><div style={{fontSize:11,color:"#10b981",marginBottom:9,fontWeight:"bold"}}>✅ {aiRes.length} evento(s) encontrado(s):</div>
                {aiRes.length===0&&<div style={{fontSize:11,color:"#6B7280",marginBottom:9}}>Nenhum identificado. Use o modo manual.</div>}
                {aiRes.map((ev,i)=><label key={i} style={{display:"flex",alignItems:"center",gap:7,padding:"7px",background:"#0A0A12",borderRadius:7,marginBottom:4,cursor:"pointer",border:"1px solid #10b98120"}}><input type="checkbox" defaultChecked onChange={e=>setForm({...form,[`ev${i}`]:e.target.checked})}/><div><div style={{fontSize:11,fontWeight:"bold"}}>{schoolTypeMap[ev.type]||"📌"} {ev.title}</div><div style={{fontSize:10,color:"#6B7280"}}>📅 {ev.date}{ev.notes?` · ${ev.notes}`:""}</div></div></label>)}
                {aiRes.length>0&&<button onClick={confirmSchool} style={{...addBtn,width:"100%",padding:"10px",marginTop:5}}>Adicionar Selecionados</button>}
              </div>}
              <button onClick={closeModal} style={{width:"100%",padding:"9px",background:"#ffffff0D",border:"none",borderRadius:9,color:"#9CA3AF",cursor:"pointer",fontFamily:"Georgia,serif",marginTop:5}}>Cancelar</button>
            </div>}

            {modal==="escola_manual"&&<form onSubmit={addSchoolM}>
              <h3 style={{margin:"0 0 14px",fontSize:15}}>🏫 Novo Evento Escolar</h3>
              <FI label="Título" value={form.title||""} onChange={v=>setForm({...form,title:v})} required placeholder="Ex: Reunião de pais"/>
              <FI label="Data" type="date" value={form.date||""} onChange={v=>setForm({...form,date:v})} required/>
              <FS label="Tipo" value={form.type||"evento"} onChange={v=>setForm({...form,type:v})} options={[["reuniao","👥 Reunião"],["evento","🎉 Evento"],["feriado","📅 Feriado"],["avaliacao","📝 Avaliação"],["outro","📌 Outro"]]}/>
              <FI label="Observações" value={form.notes||""} onChange={v=>setForm({...form,notes:v})}/>
              <MB onCancel={closeModal} submitLabel="Adicionar"/>
            </form>}

          </div>
        </div>}
      </div>;
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
